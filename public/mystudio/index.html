<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>index</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="작업.icon.png" />
<link rel="apple-touch-icon" href="작업.apple-touch-icon.png"/>

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="작업.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="작업.js"></script>
		<script>
const PC_PCK_URL = "https://pub-d22a4db03f974aff80d669d3f1ef553e.r2.dev/%EC%9E%91%EC%97%85.pck";
const ANDROID_PCK_URL = "https://pub-d22a4db03f974aff80d669d3f1ef553e.r2.dev/%EC%9E%91%EC%97%85_mobile.pck";
const PC_PCK_SIZE = 480699592;
const ANDROID_PCK_SIZE = 235928488;

const IS_ANDROID = /Android/i.test(navigator.userAgent);
const PCK_URL = IS_ANDROID ? ANDROID_PCK_URL : PC_PCK_URL;
const PCK_SIZE = IS_ANDROID ? ANDROID_PCK_SIZE : PC_PCK_SIZE;

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"작업","mainPack":PCK_URL,"experimentalVK":false,"fileSizes":{[PCK_URL]:PCK_SIZE,"작업.wasm":35754592},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';
	let lastProgressPercent = -1;

	function getErrorMessage(err) {
		if (err instanceof Error) {
			return err.message;
		}
		if (typeof err === 'string') {
			return err;
		}
		try {
			return JSON.stringify(err) || String(err);
		} catch (_error) {
			return 'An unknown error occurred.';
		}
	}

	function reportLoadFailure(stage, err) {
		const message = getErrorMessage(err);
		console.error(`[MyStudio] ${stage}:`, err);
		window.parent.postMessage({
			source: 'godot',
			type: 'LOAD_FAILED',
			stage,
			message,
		}, window.location.origin);
	}

	window.addEventListener('error', (event) => {
		reportLoadFailure('javascript_error', event.error || event.message);
	});

	window.addEventListener('unhandledrejection', (event) => {
		reportLoadFailure('unhandled_rejection', event.reason);
	});

	document.getElementById('canvas').addEventListener('webglcontextlost', () => {
		reportLoadFailure('webgl_context_lost', 'WebGL context lost.');
	});

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err, stage = 'engine_start_failed') {
		reportLoadFailure(stage, err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	function preparePckCacheServiceWorker() {
		if (!('serviceWorker' in navigator)) {
			return Promise.resolve();
		}
		const registrationReady = navigator.serviceWorker.register('/mystudio/pck-cache-sw.js', {
			scope: '/mystudio/',
		}).then(() => navigator.serviceWorker.ready);
		return Promise.race([
			registrationReady,
			new Promise((resolve) => {
				setTimeout(resolve, 2000);
			}),
		]).catch((err) => {
			console.warn('PCK cache service worker registration failed:', err);
		});
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'), 'missing_features');
		}
	} else {
		setStatusMode('progress');
		preparePckCacheServiceWorker().then(() => engine.startGame({
			'onProgress': function (current, total) {
				if (total > 0) {
					const percent = Math.round((current / total) * 100);
					if (percent !== lastProgressPercent) {
						lastProgressPercent = percent;
						window.parent.postMessage({
							source: 'godot',
							type: 'LOAD_PROGRESS',
							current,
							total,
							percent,
						}, window.location.origin);
					}
				}
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
			window.parent.postMessage({
				source: 'godot',
				type: 'LOAD_COMPLETE',
			}, window.location.origin);
		}, (err) => displayFailureNotice(err, 'engine_start_failed')));
	}
}());
		</script>
	</body>
</html>
