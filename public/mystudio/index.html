html, body, #canvas {
	margin: 0;

body {
	color: white;

#status {

#status-notice {

		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="작업.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="작업.js"></script>
		<script>
const PCK_URL = "https://pub-d22a4db03f974aff80d669d3f1ef553e.r2.dev/mystudio-v2.pck";

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"작업","mainPack":PCK_URL,"experimentalVK":false,"fileSizes":{[PCK_URL]:491172424,"작업.wasm":35754592},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';
	let lastProgressPercent = -1;

	function getErrorMessage(err) {
		if (err instanceof Error) {
			return err.message;
		}
		if (typeof err === 'string') {
			return err;
		}
		try {
			return JSON.stringify(err) || String(err);
		} catch (_error) {
			return 'An unknown error occurred.';
		}
	}

	function reportLoadFailure(stage, err) {
		const message = getErrorMessage(err);
		console.error(`[MyStudio] ${stage}:`, err);
		window.parent.postMessage({
			source: 'godot',
			type: 'LOAD_FAILED',
			stage,
			message,
		}, window.location.origin);
	}

	function safeSerialize(value) {
		const seen = new WeakSet();
		try {
			return JSON.stringify(value, (_key, current) => {
				if (typeof current === 'bigint') {
					return `${current.toString()}n`;
				}
				if (typeof current === 'symbol' || typeof current === 'function') {
					return String(current);
				}
				if (current && typeof current === 'object') {
					if (seen.has(current)) {
						return '[Circular]';
					}
					seen.add(current);
				}
				return current;
			}) || safeToString(value);
		} catch (serializationError) {
			return `[Serialization failed: ${getErrorMessage(serializationError)}] ${safeToString(value)}`;
		}
	}

	function safeToString(value) {
		try {
			return String(value);
		} catch (_error) {
			return '[Unstringifiable value]';
		}
	}

	function getProperty(reason, key) {
		try {
			return reason?.[key] || '';
		} catch (propertyError) {
			return `[unavailable: ${getErrorMessage(propertyError)}]`;
		}
	}

	function getEnumerableProperties(reason) {
		const properties = {};
		if (reason == null || (typeof reason !== 'object' && typeof reason !== 'function')) {
			return properties;
		}
		try {
			Object.keys(reason).forEach((key) => {
				try {
					properties[key] = reason[key];
				} catch (propertyError) {
					properties[key] = `[Property access failed: ${getErrorMessage(propertyError)}]`;
				}
			});
		} catch (keysError) {
			properties['[[Object.keys failed]]'] = getErrorMessage(keysError);
		}
		return properties;
	}

	function reportUnhandledRejection(reason) {
		let constructorName = '';
		let objectTag = '';
		try {
			constructorName = reason?.constructor?.name || '';
		} catch (_error) {
			constructorName = '[unavailable]';
		}
		try {
			objectTag = Object.prototype.toString.call(reason);
		} catch (_error) {
			objectTag = '[object tag unavailable]';
		}

		const details = {
			name: getProperty(reason, 'name'),
			message: getProperty(reason, 'message'),
			stack: getProperty(reason, 'stack'),
			constructorName,
			objectTag,
			enumerableProperties: getEnumerableProperties(reason),
		};
		const serializedDetails = safeSerialize(details);
		const summaryParts = [];
		if (details.name) summaryParts.push(`name=${safeToString(details.name).slice(0, 120)}`);
		if (details.message) summaryParts.push(`message=${safeToString(details.message).slice(0, 300)}`);
		if (details.constructorName) summaryParts.push(`constructor=${safeToString(details.constructorName)}`);
		if (details.objectTag) summaryParts.push(`tag=${safeToString(details.objectTag)}`);
		if (details.stack) {
			const compactStack = safeToString(details.stack).replace(/\s*\n\s*/g, ' <- ').slice(0, 500);
			summaryParts.push(`stack=${compactStack}`);
		}
		if (!details.name && !details.message && !details.stack) {
			summaryParts.push(`reason=${safeSerialize(reason).slice(0, 300)}`);
		}
		const message = summaryParts.join(' | ') || 'Unhandled promise rejection (no details available).';

		console.error('[MyStudio] unhandled_rejection details:', serializedDetails, details, reason);
		window.parent.postMessage({
			source: 'godot',
			type: 'LOAD_FAILED',
			stage: 'unhandled_rejection',
			message,
		}, window.location.origin);
	}

	window.addEventListener('error', (event) => {
		reportLoadFailure('javascript_error', event.error || event.message);
	});

	window.addEventListener('unhandledrejection', (event) => {
		reportUnhandledRejection(event.reason);
	});

	document.getElementById('canvas').addEventListener('webglcontextlost', () => {
		reportLoadFailure('webgl_context_lost', 'WebGL context lost.');
	});

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err, stage = 'engine_start_failed') {
		reportLoadFailure(stage, err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	function preparePckCacheServiceWorker() {
		if (!('serviceWorker' in navigator)) {
			return Promise.resolve();
		}
		const registrationReady = navigator.serviceWorker.register('/mystudio/pck-cache-sw.js', {
			scope: '/mystudio/',
		}).then(() => navigator.serviceWorker.ready);
		return Promise.race([
			registrationReady,
			new Promise((resolve) => {
				setTimeout(resolve, 2000);
			}),
		]).catch((err) => {
			console.warn('PCK cache service worker registration failed:', err);
		});
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'), 'missing_features');
		}
	} else {
		setStatusMode('progress');
		preparePckCacheServiceWorker().then(() => engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total === 0) {
					console.log('Godot load progress:', { current, total });
				}
				if (total > 0) {
					const percent = Math.round((current / total) * 100);
					if (percent !== lastProgressPercent) {
						lastProgressPercent = percent;
						window.parent.postMessage({
							source: 'godot',
							type: 'LOAD_PROGRESS',
							current,
							total,
							percent,
						}, window.location.origin);
					}
				}
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
			window.parent.postMessage({
				source: 'godot',
				type: 'LOAD_COMPLETE',
			}, window.location.origin);
		}, (err) => displayFailureNotice(err, 'engine_start_failed')));
	}
}());
		</script>
